<!DOCTYPE html>
<html>
<head>
    <title>Pi File Manager (Secure)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; padding: 20px; background: #f4f4f9; color: #37352f; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Breadcrumbs */
        .breadcrumb { margin-bottom: 20px; font-size: 14px; color: #666; }
        .breadcrumb a { color: #007bff; text-decoration: none; font-weight: 500; }
        .breadcrumb a:hover { text-decoration: underline; }

        /* Upload Section */
        .upload-section { background: #f1f3f5; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px dashed #ced4da; }
        .upload-section strong { display: block; margin-bottom: 10px; font-size: 14px; }
        .upload-btn { background: #28a745; color: white; border: none; padding: 7px 18px; border-radius: 5px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        .upload-btn:hover { background: #218838; }

        /* Table Design */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; font-size: 13px; text-transform: uppercase; color: #888; }
        td { text-align: left; padding: 14px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        tr:hover { background-color: #fafafa; }

        /* Icons and Buttons */
        .icon { margin-right: 12px; font-size: 1.3em; display: inline-block; width: 25px; text-align: center; }
        .folder-link { font-weight: 600; color: #37352f; text-decoration: none; }
        .folder-link:hover { color: #007bff; }
        .btn { padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .open-btn { background: #e7f3ff; color: #007bff; border: 1px solid #d0e7ff; }
        .open-btn:hover { background: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="breadcrumb">
        <a href="/?key={{ key }}">🏠 Home</a> 
        {% if current_path %}
            / {{ current_path }}
        {% endif %}
    </div>

    <div class="upload-section">
        <strong>📤 Upload to this folder</strong>
        <form action="/upload?key={{ key }}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="path" value="{{ current_path }}">
            <input type="file" name="file" required>
            <button type="submit" class="upload-btn">Upload</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th style="width: 120px;">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>
                    {% if item.is_dir %}
                        <span class="icon">📁</span>
                        <a class="folder-link" href="/?path={{ current_path }}/{{ item.name }}&key={{ key }}">
                            {{ item.name }}
                        </a>
                    {% else %}
                        <span class="icon">📄</span> 
                        {{ item.name }}
                    {% endif %}
                </td>
                <td>
                    {% if not item.is_dir %}
                        <a href="/view/{{ current_path }}/{{ item.name }}?key={{ key }}" target="_blank" class="btn open-btn">View/Open</a>
                    {% endif %}
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="2" style="text-align: center; color: #999; padding: 40px;">This folder is empty.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
